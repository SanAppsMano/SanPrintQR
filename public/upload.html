<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Upload</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <h1>Upload Job</h1>
  <form id="uploadForm">
    <label>Filename <input name="filename" required></label>
    <label>Pages <input name="pages" type="number" required></label>
    <label>File path <input name="filePath" required></label>
    <button type="submit">Enviar</button>
  </form>
  <script src="/app.js"></script>
  <script>
  requireLogin();
  document.getElementById('uploadForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const body = {
      filename: this.filename.value,
      pages: parseInt(this.pages.value,10),
      filePath: this.filePath.value
    };
    await api('/api/upload',{method:'POST',body:JSON.stringify(body)});
    alert('Job created');
  });
  </script>
</body>
</html>
